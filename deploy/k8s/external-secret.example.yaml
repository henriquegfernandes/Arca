apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: arca-secrets
  namespace: arca
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: production-secret-store
  target:
    name: arca-secrets
    creationPolicy: Owner
  data:
    - secretKey: ConnectionStrings__DefaultConnection
      remoteRef:
        key: arca/production/database
        property: connectionString
    - secretKey: Storage__S3__BucketName
      remoteRef:
        key: arca/production/storage
        property: bucketName
    - secretKey: Storage__S3__Region
      remoteRef:
        key: arca/production/storage
        property: region
    - secretKey: Storage__S3__AccessKey
      remoteRef:
        key: arca/production/storage
        property: accessKey
    - secretKey: Storage__S3__SecretKey
      remoteRef:
        key: arca/production/storage
        property: secretKey
    - secretKey: Storage__S3__PublicBaseUrl
      remoteRef:
        key: arca/production/storage
        property: publicBaseUrl
