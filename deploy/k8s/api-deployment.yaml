apiVersion: apps/v1
kind: Deployment
metadata:
  name: arca-api
  namespace: arca
spec:
  replicas: 2
  selector:
    matchLabels:
      app: arca-api
  template:
    metadata:
      labels:
        app: arca-api
    spec:
      containers:
        - name: arca-api
          image: ghcr.io/your-org/arca-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: arca-config
            - secretRef:
                name: arca-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
