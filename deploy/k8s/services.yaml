apiVersion: v1
kind: Service
metadata:
  name: arca-web
  namespace: arca
spec:
  selector:
    app: arca-web
  ports:
    - name: http
      port: 80
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: arca-api
  namespace: arca
spec:
  selector:
    app: arca-api
  ports:
    - name: http
      port: 80
      targetPort: 8080
